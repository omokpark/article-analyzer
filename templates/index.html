<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Article Analyzer</title>
  <script src="https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js"></script>
  <style>
    :root {
      --primary: #4f46e5;
      --primary-hover: #4338ca;
      --bg: #f8fafc;
      --card-bg: #ffffff;
      --text-main: #1e293b;
      --text-muted: #64748b;
      --border: #e2e8f0;
      --accent: #818cf8;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text-main);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
    }

    header {
      margin-bottom: 32px;
      text-align: center;
    }

    header h1 {
      font-size: 2rem;
      font-weight: 800;
      letter-spacing: -0.025em;
      color: var(--primary);
    }

    header p {
      margin-top: 8px;
      font-size: 1rem;
      color: var(--text-muted);
    }

    .card {
      background: var(--card-bg);
      border-radius: 24px;
      box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.05);
      padding: 40px;
      width: 100%;
      max-width: 800px;
      transition: transform 0.3s ease;
    }

    .input-row {
      display: flex;
      gap: 12px;
      margin-bottom: 24px;
    }

    .input-row input[type="url"] {
      flex: 1;
      padding: 14px 20px;
      border: 2px solid var(--border);
      border-radius: 14px;
      font-size: 1rem;
      outline: none;
      transition: all 0.2s;
    }

    .input-row input[type="url"]:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.1);
    }

    .input-row button {
      padding: 14px 28px;
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: 14px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
    }

    .input-row button:hover {
      background: var(--primary-hover);
      transform: translateY(-1px);
    }

    .input-row button:disabled {
      background: #cbd5e1;
      cursor: not-allowed;
      transform: none;
    }

    #result {
      margin-top: 40px;
      display: none;
      animation: fadeIn 0.5s ease-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    #result.visible { display: block; }

    .result-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 24px;
    }

    .title-area { flex: 1; }

    .result-title {
      font-size: 1.5rem;
      font-weight: 800;
      line-height: 1.3;
      margin-bottom: 8px;
    }

    .result-url {
      font-size: 0.85rem;
      color: var(--text-muted);
      word-break: break-all;
    }

    .copy-btn {
      background: none;
      border: 1px solid var(--border);
      padding: 8px 12px;
      border-radius: 8px;
      font-size: 0.8rem;
      cursor: pointer;
      transition: all 0.2s;
      color: var(--text-muted);
    }

    .copy-btn:hover {
      background: var(--bg);
      color: var(--primary);
    }

    .badge {
      font-size: 0.75rem;
      font-weight: 700;
      padding: 4px 10px;
      border-radius: 6px;
      text-transform: uppercase;
      margin-bottom: 12px;
      display: inline-block;
    }

    .badge-simple { background: #e0f2fe; color: #0369a1; }
    .badge-deep { background: #fef3c7; color: #92400e; }

    .analysis-section {
      margin-top: 32px;
    }

    .summary-box {
      background: #f1f5f9;
      padding: 24px;
      border-radius: 16px;
      border-left: 4px solid var(--primary);
      margin-bottom: 24px;
    }

    .summary-text {
      font-size: 1.1rem;
      font-weight: 600;
      line-height: 1.6;
    }

    .points-list {
      list-style: none;
      margin-bottom: 32px;
    }

    .points-list li {
      padding: 12px 0 12px 28px;
      position: relative;
      font-size: 1rem;
      line-height: 1.6;
      border-bottom: 1px solid #f1f5f9;
    }

    .points-list li::before {
      content: "→";
      position: absolute;
      left: 0;
      color: var(--primary);
      font-weight: 900;
    }

    /* Deep Dive Styles */
    .deep-dive {
      margin-top: 48px;
      padding-top: 32px;
      border-top: 2px dashed var(--border);
    }

    .section-label {
      font-size: 0.8rem;
      font-weight: 700;
      color: var(--primary);
      margin-bottom: 16px;
      display: block;
      letter-spacing: 0.05em;
    }

    .mermaid-container {
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 32px;
      overflow-x: auto;
      display: flex;
      justify-content: center;
    }

    .detailed-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 20px;
      margin-bottom: 32px;
    }

    .detail-card {
      background: #fff;
      border: 1px solid var(--border);
      padding: 20px;
      border-radius: 16px;
    }

    .detail-card h4 {
      font-size: 1rem;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .detail-card p {
      font-size: 0.9rem;
      color: #475569;
      line-height: 1.6;
    }

    .insight-box {
      background: linear-gradient(135deg, #4f46e5 0%, #818cf8 100%);
      color: #fff;
      padding: 24px;
      border-radius: 16px;
      margin-bottom: 32px;
    }

    .insight-box h4 { margin-bottom: 10px; font-size: 1.1rem; }
    .insight-box p { font-size: 0.95rem; line-height: 1.6; opacity: 0.9; }

    .tag-container {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .tag-item {
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--primary);
      background: #eef2ff;
      padding: 6px 14px;
      border-radius: 100px;
    }

    .spinner {
      display: none;
      text-align: center;
      padding: 40px;
      color: var(--text-muted);
    }

    .spinner.visible { display: block; }

    .spinner-icon {
      width: 30px;
      height: 30px;
      border: 3px solid #e2e8f0;
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 12px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    @media (max-width: 640px) {
      .input-row { flex-direction: column; }
      .card { padding: 24px; }
      .result-header { flex-direction: column; }
      .copy-btn { margin-top: 12px; align-self: flex-start; }
    }
  </style>
</head>
<body>
  <header>
    <h1>AI Article Analyzer</h1>
    <p>URL을 입력하면 인공지능이 핵심을 파고듭니다.</p>
  </header>

  <div class="card">
    <form id="analyzeForm">
      <div class="input-row">
        <input type="url" id="urlInput" placeholder="분석할 URL을 입력하세요" required autocomplete="off" />
        <button type="submit" id="submitBtn">분석하기</button>
      </div>
    </form>

    <div class="spinner" id="spinner">
      <div class="spinner-icon"></div>
      <p>기사를 정독하며 분석 중입니다...</p>
    </div>

    <div id="result">
      <div id="depthBadge"></div>
      <div class="result-header">
        <div class="title-area">
          <h2 class="result-title" id="resultTitle"></h2>
          <p class="result-url" id="resultUrl"></p>
        </div>
        <button class="copy-btn" id="copyBtn">결과 복사</button>
      </div>

      <div class="analysis-section">
        <div class="summary-box">
          <p class="summary-text" id="resultSummary"></p>
        </div>
        
        <ul class="points-list" id="resultPoints"></ul>

        <!-- Deep Dive Section -->
        <div id="deepDiveContent" class="deep-dive" style="display: none;">
          <span class="section-label">VISUALIZATION</span>
          <div class="mermaid-container" id="mermaidContainer"></div>

          <span class="section-label">DETAILED ANALYSIS</span>
          <div class="detailed-grid" id="detailedGrid"></div>

          <span class="section-label">PROFESSIONAL INSIGHT</span>
          <div class="insight-box" id="insightBox"></div>
        </div>

        <div class="tag-container" id="resultTags"></div>
      </div>
    </div>
  </div>

  <script>
    mermaid.initialize({ startOnLoad: false, theme: 'neutral' });

    const form = document.getElementById("analyzeForm");
    const urlInput = document.getElementById("urlInput");
    const submitBtn = document.getElementById("submitBtn");
    const spinner = document.getElementById("spinner");
    const result = document.getElementById("result");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      const url = urlInput.value.trim();
      if (!url) return;

      result.classList.remove("visible");
      spinner.classList.add("visible");
      submitBtn.disabled = true;

      try {
        const res = await fetch("/analyze", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ url }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || "실패");

        renderResult(data);
        result.classList.add("visible");
      } catch (err) {
        alert(err.message);
      } finally {
        spinner.classList.remove("visible");
        submitBtn.disabled = false;
      }
    });

    function renderResult(data) {
      document.getElementById("resultTitle").textContent = data.title;
      document.getElementById("resultUrl").textContent = data.url;
      document.getElementById("resultSummary").textContent = data.summary;

      // Depth Badge
      const badge = document.getElementById("depthBadge");
      badge.className = `badge badge-${data.depth || 'simple'}`;
      badge.textContent = `${data.category} • ${data.depth === 'deep' ? '심층 분석' : '일반 요약'}`;

      // Points
      const pointsList = document.getElementById("resultPoints");
      pointsList.innerHTML = "";
      (data.points || []).forEach(p => {
        const li = document.createElement("li");
        li.textContent = p;
        pointsList.appendChild(li);
      });

      // Tags
      const tagsEl = document.getElementById("resultTags");
      tagsEl.innerHTML = "";
      (data.tags || []).forEach(t => {
        const span = document.createElement("span");
        span.className = "tag-item";
        span.textContent = "#" + t;
        tagsEl.appendChild(span);
      });

      // Deep Dive
      const deepSection = document.getElementById("deepDiveContent");
      if (data.depth === 'deep') {
        deepSection.style.display = "block";
        
        // Mermaid
        const container = document.getElementById("mermaidContainer");
        container.innerHTML = `<div class="mermaid">${data.mermaid}</div>`;
        mermaid.init(undefined, container.querySelectorAll(".mermaid"));

        // Detailed Grid
        const grid = document.getElementById("detailedGrid");
        grid.innerHTML = "";
        (data.detailed_analysis || []).forEach(item => {
          const card = document.createElement("div");
          card.className = "detail-card";
          card.innerHTML = `<h4>${item.section}</h4><p>${item.content}</p>`;
          grid.appendChild(card);
        });

        // Insight
        const insightBox = document.getElementById("insightBox");
        insightBox.innerHTML = `<h4>💡 Expert Insight</h4><p>${data.insight}</p>`;
      } else {
        deepSection.style.display = "none";
      }
    }

    document.getElementById("copyBtn").addEventListener("click", () => {
      const title = document.getElementById("resultTitle").textContent;
      const summary = document.getElementById("resultSummary").textContent;
      const points = Array.from(document.querySelectorAll("#resultPoints li")).map(li => "• " + li.textContent).join("\n");
      const text = `[기사 분석] ${title}\n\n요약: ${summary}\n\n핵심 포인트:\n${points}`;
      
      navigator.clipboard.writeText(text).then(() => {
        const btn = document.getElementById("copyBtn");
        const original = btn.textContent;
        btn.textContent = "복사됨!";
        setTimeout(() => btn.textContent = original, 2000);
      });
    });
  </script>
</body>

</html>

<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Article Analyzer</title>
  <script src="https://cdn.jsdelivr.net/npm/mermaid@11.14.0/dist/mermaid.min.js" integrity="sha384-1CMXl090wj8Dd6YfnzSQUOgWbE6suWCaenYG7pox5AX7apTpY3PmJMeS2oPql4Gk" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js" integrity="sha384-CjloA8y00+1SDAUkjs099PVfnY2KmDC2BZnws9kh8D/lX1s46w6EPhpXdqMfjK6i" crossorigin="anonymous"></script>
  <style>
    :root {
      --primary: #4f46e5;
      --primary-hover: #4338ca;
      --bg: #f8fafc;
      --card-bg: #ffffff;
      --text-main: #1e293b;
      --text-muted: #64748b;
      --border: #e2e8f0;
      --accent: #818cf8;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text-main);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
    }

    header {
      margin-bottom: 20px;
      text-align: center;
    }

    header h1 {
      font-size: 2rem;
      font-weight: 800;
      letter-spacing: -0.025em;
      color: var(--primary);
    }

    header p {
      margin-top: 8px;
      font-size: 1rem;
      color: var(--text-muted);
    }

    /* ── Tab Navigation ── */
    .tab-nav {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
    }

    .tab-btn {
      padding: 9px 22px;
      border-radius: 10px;
      border: 2px solid var(--border);
      background: none;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      color: var(--text-muted);
      transition: all 0.2s;
    }

    .tab-btn.active {
      background: var(--primary);
      color: #fff;
      border-color: var(--primary);
    }

    /* ── Analyze Card ── */
    .card {
      background: var(--card-bg);
      border-radius: 24px;
      box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.05);
      padding: 40px;
      width: 100%;
      max-width: 800px;
    }

    .input-row {
      display: flex;
      gap: 12px;
      margin-bottom: 24px;
    }

    .input-row input[type="url"] {
      flex: 1;
      padding: 14px 20px;
      border: 2px solid var(--border);
      border-radius: 14px;
      font-size: 1rem;
      outline: none;
      transition: all 0.2s;
    }

    .input-row input[type="url"]:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.1);
    }

    .input-row button {
      padding: 14px 28px;
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: 14px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
    }

    .input-row button:hover { background: var(--primary-hover); transform: translateY(-1px); }
    .input-row button:disabled { background: #cbd5e1; cursor: not-allowed; transform: none; }

    #result {
      margin-top: 40px;
      display: none;
      animation: fadeIn 0.5s ease-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    #result.visible { display: block; }

    .result-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 24px;
    }

    .title-area { flex: 1; }

    .result-title {
      font-size: 1.5rem;
      font-weight: 800;
      line-height: 1.3;
      margin-bottom: 8px;
    }

    .result-url {
      font-size: 0.85rem;
      color: var(--text-muted);
      word-break: break-all;
    }

    .copy-btn {
      background: none;
      border: 1px solid var(--border);
      padding: 8px 12px;
      border-radius: 8px;
      font-size: 0.8rem;
      cursor: pointer;
      transition: all 0.2s;
      color: var(--text-muted);
      white-space: nowrap;
      margin-left: 12px;
    }

    .copy-btn:hover { background: var(--bg); color: var(--primary); }

    .badge {
      font-size: 0.75rem;
      font-weight: 700;
      padding: 4px 10px;
      border-radius: 6px;
      text-transform: uppercase;
      margin-bottom: 12px;
      display: inline-block;
    }

    .badge-simple { background: #e0f2fe; color: #0369a1; }
    .badge-deep { background: #fef3c7; color: #92400e; }

    .analysis-section { margin-top: 32px; }

    .summary-box {
      background: #f1f5f9;
      padding: 24px;
      border-radius: 16px;
      border-left: 4px solid var(--primary);
      margin-bottom: 24px;
    }

    .summary-text { font-size: 1.1rem; font-weight: 600; line-height: 1.6; }

    .points-list { list-style: none; margin-bottom: 32px; }

    .points-list li {
      padding: 12px 0 12px 28px;
      position: relative;
      font-size: 1rem;
      line-height: 1.6;
      border-bottom: 1px solid #f1f5f9;
    }

    .points-list li::before {
      content: "→";
      position: absolute;
      left: 0;
      color: var(--primary);
      font-weight: 900;
    }

    .deep-dive {
      margin-top: 48px;
      padding-top: 32px;
      border-top: 2px dashed var(--border);
    }

    .section-label {
      font-size: 0.8rem;
      font-weight: 700;
      color: var(--primary);
      margin-bottom: 16px;
      display: block;
      letter-spacing: 0.05em;
    }

    .mermaid-container {
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 40px 32px;
      margin-bottom: 32px;
      overflow-x: auto;
      width: 100%;
      min-height: 320px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .mermaid-container svg {
      width: 100% !important;
      max-width: 100% !important;
      height: auto !important;
      min-height: 280px;
    }

    .detailed-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 20px;
      margin-bottom: 32px;
    }

    .detail-card {
      background: #fff;
      border: 1px solid var(--border);
      padding: 20px;
      border-radius: 16px;
    }

    .detail-card h4 { font-size: 1rem; font-weight: 700; margin-bottom: 8px; }
    .detail-card p { font-size: 0.9rem; color: #475569; line-height: 1.6; }

    .insight-box {
      background: linear-gradient(135deg, #4f46e5 0%, #818cf8 100%);
      color: #fff;
      padding: 24px;
      border-radius: 16px;
      margin-bottom: 32px;
    }

    .insight-box h4 { margin-bottom: 10px; font-size: 1.1rem; }
    .insight-box p { font-size: 0.95rem; line-height: 1.6; opacity: 0.9; }

    .tag-container { display: flex; flex-wrap: wrap; gap: 8px; }

    .tag-item {
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--primary);
      background: #eef2ff;
      padding: 6px 14px;
      border-radius: 100px;
    }

    /* Save button */
    .save-btn {
      margin-top: 20px;
      padding: 12px 20px;
      background: none;
      border: 2px solid var(--primary);
      color: var(--primary);
      border-radius: 12px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      width: 100%;
    }

    .save-btn:hover { background: var(--primary); color: #fff; }
    .save-btn:disabled { border-color: #94a3b8; color: #94a3b8; cursor: not-allowed; background: none; }

    .spinner {
      display: none;
      text-align: center;
      padding: 40px;
      color: var(--text-muted);
    }

    .spinner.visible { display: block; }

    .spinner-icon {
      width: 30px;
      height: 30px;
      border: 3px solid #e2e8f0;
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 12px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Library Card ── */
    .library-card {
      background: var(--card-bg);
      border-radius: 24px;
      box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05);
      padding: 32px;
      width: 100%;
      max-width: 1200px;
    }

    .library-layout {
      display: grid;
      grid-template-columns: 1fr 300px;
      gap: 20px;
      height: 580px;
    }

    .graph-area {
      background: #f8fafc;
      border-radius: 16px;
      border: 1px solid var(--border);
      overflow: hidden;
      position: relative;
    }

    .graph-area svg { width: 100%; height: 100%; }

    .graph-empty {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: var(--text-muted);
      gap: 12px;
      font-size: 0.9rem;
      text-align: center;
      line-height: 1.6;
    }

    .graph-tooltip {
      position: absolute;
      background: rgba(15, 23, 42, 0.85);
      color: #fff;
      padding: 6px 10px;
      border-radius: 8px;
      font-size: 0.75rem;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.15s;
      max-width: 220px;
      z-index: 10;
    }

    .detail-panel {
      background: #f8fafc;
      border-radius: 16px;
      border: 1px solid var(--border);
      padding: 24px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
    }

    .detail-placeholder {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: var(--text-muted);
      text-align: center;
      gap: 8px;
      font-size: 0.85rem;
      line-height: 1.6;
    }

    .detail-content { display: none; flex-direction: column; height: 100%; }
    .detail-content.visible { display: flex; }

    .detail-badge {
      font-size: 0.7rem;
      font-weight: 700;
      padding: 3px 8px;
      border-radius: 5px;
      display: inline-block;
      margin-bottom: 10px;
    }

    .detail-title {
      font-size: 0.95rem;
      font-weight: 700;
      line-height: 1.4;
      margin-bottom: 6px;
    }

    .detail-meta {
      font-size: 0.72rem;
      color: var(--text-muted);
      margin-bottom: 14px;
    }

    .detail-summary {
      font-size: 0.82rem;
      line-height: 1.6;
      color: #475569;
      margin-bottom: 14px;
      padding: 12px;
      background: #fff;
      border-radius: 10px;
      border-left: 3px solid var(--primary);
      flex-shrink: 0;
    }

    .detail-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      margin-bottom: 14px;
    }

    .detail-tag {
      font-size: 0.72rem;
      color: var(--primary);
      background: #eef2ff;
      padding: 3px 9px;
      border-radius: 100px;
    }

    .detail-link {
      font-size: 0.72rem;
      color: var(--primary);
      word-break: break-all;
      margin-bottom: 16px;
      display: block;
      opacity: 0.8;
    }

    .detail-link:hover { opacity: 1; }

    .delete-btn {
      margin-top: auto;
      padding: 10px;
      background: none;
      border: 1px solid #fca5a5;
      color: #ef4444;
      border-radius: 10px;
      font-size: 0.82rem;
      cursor: pointer;
      transition: all 0.2s;
    }

    .delete-btn:hover { background: #fef2f2; }

    .library-footer {
      margin-top: 14px;
      font-size: 0.8rem;
      color: var(--text-muted);
      text-align: right;
    }

    @media (max-width: 900px) {
      .library-layout { grid-template-columns: 1fr; height: auto; }
      .graph-area { height: 360px; }
    }

    @media (max-width: 640px) {
      .input-row { flex-direction: column; }
      .card { padding: 24px; }
      .result-header { flex-direction: column; }
      .copy-btn { margin-top: 12px; margin-left: 0; align-self: flex-start; }
    }
  </style>
</head>
<body>
  <header>
    <h1>AI Article Analyzer</h1>
    <p>URL을 입력하면 인공지능이 핵심을 파고듭니다.</p>
  </header>

  <!-- 탭 네비게이션 -->
  <div class="tab-nav">
    <button class="tab-btn active" id="tabAnalyze" onclick="switchTab('analyze')">분석</button>
    <button class="tab-btn" id="tabLibrary" onclick="switchTab('library')">📚 라이브러리</button>
  </div>

  <!-- ── 분석 뷰 ── -->
  <div class="card" id="analyzeView">
    <form id="analyzeForm">
      <div class="input-row">
        <input type="url" id="urlInput" placeholder="분석할 URL을 입력하세요" required autocomplete="off" />
        <button type="submit" id="submitBtn">분석하기</button>
      </div>
    </form>

    <div class="spinner" id="spinner">
      <div class="spinner-icon"></div>
      <p>기사를 정독하며 분석 중입니다...</p>
    </div>

    <div id="result">
      <div id="depthBadge"></div>
      <div class="result-header">
        <div class="title-area">
          <h2 class="result-title" id="resultTitle"></h2>
          <p class="result-url" id="resultUrl"></p>
        </div>
        <button class="copy-btn" id="copyBtn">결과 복사</button>
      </div>

      <div class="analysis-section">
        <div class="summary-box">
          <p class="summary-text" id="resultSummary"></p>
        </div>

        <ul class="points-list" id="resultPoints"></ul>

        <!-- Deep Dive Section -->
        <div id="deepDiveContent" class="deep-dive" style="display: none;">
          <span class="section-label">VISUALIZATION</span>
          <div class="mermaid-container" id="mermaidContainer"></div>

          <span class="section-label">DETAILED ANALYSIS</span>
          <div class="detailed-grid" id="detailedGrid"></div>

          <span class="section-label">PROFESSIONAL INSIGHT</span>
          <div class="insight-box" id="insightBox"></div>
        </div>

        <div class="tag-container" id="resultTags"></div>

        <!-- 저장 버튼 (분석 완료 후 표시) -->
        <button class="save-btn" id="saveBtn" style="display:none;" onclick="saveToLibrary()">
          📚 라이브러리에 저장
        </button>
      </div>
    </div>
  </div>

  <!-- ── 라이브러리 뷰 ── -->
  <div class="library-card" id="libraryView" style="display:none;">
    <div class="library-layout">
      <!-- D3.js 그래프 영역 -->
      <div class="graph-area" id="graphArea">
        <div class="graph-empty" id="graphEmpty">
          <span style="font-size:2.5rem;">📭</span>
          <p>저장된 아티클이 없습니다.<br>분석 후 라이브러리에 저장해보세요.</p>
        </div>
        <div class="graph-tooltip" id="graphTooltip"></div>
      </div>

      <!-- 아티클 상세 패널 -->
      <div class="detail-panel" id="detailPanel">
        <div class="detail-placeholder" id="detailPlaceholder">
          <span style="font-size:2rem;">👆</span>
          <p>노드를 클릭하면<br>아티클 상세 정보가<br>표시됩니다.</p>
        </div>
        <div class="detail-content" id="detailContent">
          <div class="detail-badge" id="detailBadge"></div>
          <div class="detail-title" id="detailTitle"></div>
          <div class="detail-meta" id="detailMeta"></div>
          <div class="detail-summary" id="detailSummary"></div>
          <div class="detail-tags" id="detailTags"></div>
          <a class="detail-link" id="detailLink" target="_blank" rel="noopener noreferrer"></a>
          <button class="delete-btn" onclick="deleteArticle()">🗑 라이브러리에서 삭제</button>
        </div>
      </div>
    </div>
    <div class="library-footer" id="libraryFooter"></div>
  </div>

  <script>
    mermaid.initialize({ startOnLoad: false, theme: 'neutral' });

    let _currentData = null;   // 현재 분석 결과
    let _selectedNode = null;  // 그래프에서 선택된 노드

    // ── 탭 전환 ────────────────────────────────────────────────────────────
    function switchTab(tab) {
      const isLib = tab === 'library';
      document.getElementById('analyzeView').style.display = isLib ? 'none' : 'block';
      document.getElementById('libraryView').style.display  = isLib ? 'block' : 'none';
      document.getElementById('tabAnalyze').classList.toggle('active', !isLib);
      document.getElementById('tabLibrary').classList.toggle('active', isLib);
      if (isLib) loadLibrary();
    }

    // ── 분석 폼 ────────────────────────────────────────────────────────────
    const form      = document.getElementById("analyzeForm");
    const urlInput  = document.getElementById("urlInput");
    const submitBtn = document.getElementById("submitBtn");
    const spinner   = document.getElementById("spinner");
    const result    = document.getElementById("result");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      const url = urlInput.value.trim();
      if (!url) return;

      result.classList.remove("visible");
      spinner.classList.add("visible");
      submitBtn.disabled = true;

      // 저장 버튼 초기화
      const saveBtn = document.getElementById("saveBtn");
      saveBtn.style.display = "none";
      saveBtn.disabled = false;
      saveBtn.textContent = "📚 라이브러리에 저장";
      _currentData = null;

      try {
        const res = await fetch("/analyze", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ url }),
        });

        let data;
        try { data = await res.json(); }
        catch { throw new Error("서버 응답을 처리할 수 없습니다. 잠시 후 다시 시도해주세요."); }

        if (!res.ok) throw new Error(data.error || "알 수 없는 오류");

        _currentData = data;
        renderResult(data);
        result.classList.add("visible");
        saveBtn.style.display = "block";
      } catch (err) {
        alert(err.message);
      } finally {
        spinner.classList.remove("visible");
        submitBtn.disabled = false;
      }
    });

    function renderResult(data) {
      document.getElementById("resultTitle").textContent   = data.title;
      document.getElementById("resultUrl").textContent     = data.url;
      document.getElementById("resultSummary").textContent = data.summary;

      const badge = document.getElementById("depthBadge");
      badge.className = `badge badge-${data.depth || 'simple'}`;
      badge.textContent = `${data.category} • ${data.depth === 'deep' ? '심층 분석' : '일반 요약'}`;

      const pointsList = document.getElementById("resultPoints");
      pointsList.innerHTML = "";
      (data.points || []).forEach(p => {
        const li = document.createElement("li");
        li.textContent = p;
        pointsList.appendChild(li);
      });

      const tagsEl = document.getElementById("resultTags");
      tagsEl.innerHTML = "";
      (data.tags || []).forEach(t => {
        const span = document.createElement("span");
        span.className = "tag-item";
        span.textContent = "#" + t;
        tagsEl.appendChild(span);
      });

      const deepSection = document.getElementById("deepDiveContent");
      if (data.depth === 'deep') {
        deepSection.style.display = "block";

        const container = document.getElementById("mermaidContainer");
        const mermaidDiv = document.createElement("div");
        mermaidDiv.className = "mermaid";
        mermaidDiv.textContent = data.mermaid;
        container.innerHTML = "";
        container.appendChild(mermaidDiv);
        mermaid.init(undefined, container.querySelectorAll(".mermaid"));

        const grid = document.getElementById("detailedGrid");
        grid.innerHTML = "";
        (data.detailed_analysis || []).forEach(item => {
          const card = document.createElement("div");
          card.className = "detail-card";
          const h4 = document.createElement("h4");
          h4.textContent = item.section;
          const p = document.createElement("p");
          p.textContent = item.content;
          card.appendChild(h4);
          card.appendChild(p);
          grid.appendChild(card);
        });

        const insightBox = document.getElementById("insightBox");
        insightBox.innerHTML = "";
        const ih4 = document.createElement("h4");
        ih4.textContent = "💡 Expert Insight";
        const ip = document.createElement("p");
        ip.textContent = data.insight;
        insightBox.appendChild(ih4);
        insightBox.appendChild(ip);
      } else {
        deepSection.style.display = "none";
      }
    }

    document.getElementById("copyBtn").addEventListener("click", () => {
      const title   = document.getElementById("resultTitle").textContent;
      const summary = document.getElementById("resultSummary").textContent;
      const points  = Array.from(document.querySelectorAll("#resultPoints li")).map(li => "• " + li.textContent).join("\n");
      const text = `[기사 분석] ${title}\n\n요약: ${summary}\n\n핵심 포인트:\n${points}`;
      navigator.clipboard.writeText(text).then(() => {
        const btn = document.getElementById("copyBtn");
        const orig = btn.textContent;
        btn.textContent = "복사됨!";
        setTimeout(() => btn.textContent = orig, 2000);
      });
    });

    // ── 라이브러리 저장 ────────────────────────────────────────────────────
    async function saveToLibrary() {
      if (!_currentData) return;
      const btn = document.getElementById("saveBtn");
      btn.disabled = true;
      btn.textContent = "저장 중...";
      try {
        const res = await fetch("/articles/save", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            url:      _currentData.url,
            title:    _currentData.title,
            summary:  _currentData.summary,
            category: _currentData.category,
            depth:    _currentData.depth,
            tags:     _currentData.tags,
          }),
        });
        if (!res.ok) throw new Error();
        btn.textContent = "✓ 저장됨";
      } catch {
        btn.disabled = false;
        btn.textContent = "📚 라이브러리에 저장";
        alert("저장 중 오류가 발생했습니다.");
      }
    }

    // ── 라이브러리 로드 ────────────────────────────────────────────────────
    async function loadLibrary() {
      try {
        const res  = await fetch("/library");
        const data = await res.json();
        renderGraph(data.nodes, data.edges);
        document.getElementById("libraryFooter").textContent =
          data.nodes.length ? `아티클 ${data.nodes.length}개 · 관계 ${data.edges.length}개` : "";
      } catch {
        // 로드 실패 시 빈 상태 유지
      }
    }

    // ── D3.js Force Graph ──────────────────────────────────────────────────
    function categoryColor(cat) {
      const palette = ["#4f46e5","#059669","#dc2626","#d97706","#7c3aed","#0891b2","#be185d","#0f766e"];
      let h = 0;
      for (const c of (cat || "")) h = (h * 31 + c.charCodeAt(0)) & 0xffff;
      return palette[h % palette.length];
    }

    function nodeRadius(d) { return d.depth === "deep" ? 22 : 15; }

    function renderGraph(nodes, edges) {
      const area  = document.getElementById("graphArea");
      const empty = document.getElementById("graphEmpty");

      d3.select("#graphArea svg").remove();

      if (!nodes.length) { empty.style.display = "flex"; return; }
      empty.style.display = "none";

      const W = area.clientWidth  || 700;
      const H = area.clientHeight || 580;

      const svg = d3.select("#graphArea").append("svg")
        .attr("width", W).attr("height", H);

      const g = svg.append("g");

      // Zoom & Pan
      svg.call(
        d3.zoom().scaleExtent([0.2, 4])
          .on("zoom", e => g.attr("transform", e.transform))
      );

      const nodeData = nodes.map(n => ({ ...n }));
      const edgeData = edges.map(e => ({ ...e }));

      const sim = d3.forceSimulation(nodeData)
        .force("link", d3.forceLink(edgeData).id(d => d.id).distance(d => Math.max(80, 160 / d.weight)))
        .force("charge", d3.forceManyBody().strength(-200))
        .force("center", d3.forceCenter(W / 2, H / 2))
        .force("collision", d3.forceCollide().radius(d => nodeRadius(d) + 8));

      // Edges
      const link = g.append("g").selectAll("line")
        .data(edgeData).join("line")
        .attr("stroke", "#cbd5e1")
        .attr("stroke-width", d => Math.max(1, d.weight * 1.5))
        .attr("stroke-opacity", 0.7);

      // Nodes
      const node = g.append("g").selectAll("circle")
        .data(nodeData).join("circle")
        .attr("r", nodeRadius)
        .attr("fill", d => categoryColor(d.category))
        .attr("stroke", "#fff")
        .attr("stroke-width", 2)
        .style("cursor", "pointer")
        .call(
          d3.drag()
            .on("start", (e, d) => { if (!e.active) sim.alphaTarget(0.3).restart(); d.fx = d.x; d.fy = d.y; })
            .on("drag",  (e, d) => { d.fx = e.x; d.fy = e.y; })
            .on("end",   (e, d) => { if (!e.active) sim.alphaTarget(0); d.fx = null; d.fy = null; })
        )
        .on("click", (e, d) => { e.stopPropagation(); showArticleDetail(d); });

      // Labels
      g.append("g").selectAll("text")
        .data(nodeData).join("text")
        .text(d => d.title.length > 14 ? d.title.slice(0, 13) + "…" : d.title)
        .attr("text-anchor", "middle")
        .attr("dy", d => nodeRadius(d) + 14)
        .attr("font-size", "11px")
        .attr("fill", "#475569")
        .style("pointer-events", "none")
        .style("user-select", "none");

      // Tooltip
      const tooltip = document.getElementById("graphTooltip");
      node
        .on("mouseenter", (e, d) => { tooltip.textContent = d.title; tooltip.style.opacity = "1"; })
        .on("mousemove",  (e) => {
          const rect = area.getBoundingClientRect();
          tooltip.style.left = (e.clientX - rect.left + 14) + "px";
          tooltip.style.top  = (e.clientY - rect.top  - 12) + "px";
        })
        .on("mouseleave", () => { tooltip.style.opacity = "0"; });

      sim.on("tick", () => {
        link.attr("x1", d => d.source.x).attr("y1", d => d.source.y)
            .attr("x2", d => d.target.x).attr("y2", d => d.target.y);
        node.attr("cx", d => d.x).attr("cy", d => d.y);
        g.selectAll("text").attr("x", d => d.x).attr("y", d => d.y);
      });

      // 빈 곳 클릭 시 패널 닫기
      svg.on("click", () => {
        _selectedNode = null;
        document.getElementById("detailContent").classList.remove("visible");
        document.getElementById("detailPlaceholder").style.display = "flex";
      });
    }

    // ── 아티클 상세 패널 ────────────────────────────────────────────────────
    function showArticleDetail(node) {
      _selectedNode = node;
      document.getElementById("detailPlaceholder").style.display = "none";
      document.getElementById("detailContent").classList.add("visible");

      const badge = document.getElementById("detailBadge");
      badge.textContent = node.depth === "deep" ? "심층 분석" : "일반 요약";
      badge.className = `detail-badge badge-${node.depth || 'simple'}`;

      document.getElementById("detailTitle").textContent   = node.title;
      document.getElementById("detailMeta").textContent    = `${node.category || ""} · ${node.created_at}`;
      document.getElementById("detailSummary").textContent = node.summary || "";

      const tagsEl = document.getElementById("detailTags");
      tagsEl.innerHTML = "";
      (node.tags || []).forEach(t => {
        const span = document.createElement("span");
        span.className = "detail-tag";
        span.textContent = "#" + t;
        tagsEl.appendChild(span);
      });

      const link = document.getElementById("detailLink");
      link.textContent = node.url;
      link.href = node.url;
    }

    async function deleteArticle() {
      if (!_selectedNode) return;
      if (!confirm(`"${_selectedNode.title}" 을(를) 삭제하시겠습니까?`)) return;
      try {
        const res = await fetch(`/articles/${_selectedNode.id}`, { method: "DELETE" });
        if (!res.ok) throw new Error();
        _selectedNode = null;
        document.getElementById("detailContent").classList.remove("visible");
        document.getElementById("detailPlaceholder").style.display = "flex";
        loadLibrary();
      } catch {
        alert("삭제 중 오류가 발생했습니다.");
      }
    }
  </script>
</body>
</html>

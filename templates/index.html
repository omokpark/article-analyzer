<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI 기사 분석기</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f5f5;
      color: #1a1a1a;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 48px 16px;
    }

    header {
      margin-bottom: 40px;
      text-align: center;
    }

    header h1 {
      font-size: 1.75rem;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    header p {
      margin-top: 8px;
      font-size: 0.9rem;
      color: #666;
    }

    .card {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
      padding: 32px;
      width: 100%;
      max-width: 640px;
    }

    .input-row {
      display: flex;
      gap: 10px;
    }

    .input-row input[type="url"] {
      flex: 1;
      padding: 12px 16px;
      border: 1.5px solid #ddd;
      border-radius: 10px;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s;
    }

    .input-row input[type="url"]:focus {
      border-color: #4f46e5;
    }

    .input-row button {
      padding: 12px 22px;
      background: #4f46e5;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.2s;
    }

    .input-row button:hover { background: #4338ca; }
    .input-row button:disabled { background: #a5b4fc; cursor: not-allowed; }

    /* 결과 영역 */
    #result {
      margin-top: 28px;
      display: none;
    }

    #result.visible { display: block; }

    .result-title {
      font-size: 1.1rem;
      font-weight: 700;
      margin-bottom: 12px;
      line-height: 1.4;
    }

    .result-url {
      font-size: 0.8rem;
      color: #888;
      word-break: break-all;
      margin-bottom: 16px;
    }

    .divider {
      border: none;
      border-top: 1px solid #eee;
      margin-bottom: 16px;
    }

    .result-body {
      font-size: 0.92rem;
      line-height: 1.8;
      color: #333;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .analysis {
      margin-top: 24px;
      padding-top: 20px;
      border-top: 1px solid #eee;
    }

    .summary {
      font-size: 1rem;
      font-weight: 600;
      color: #1a1a1a;
      line-height: 1.6;
      margin-bottom: 16px;
    }

    .points {
      list-style: none;
      margin-bottom: 16px;
    }

    .points li {
      font-size: 0.9rem;
      color: #444;
      padding: 6px 0 6px 20px;
      position: relative;
      line-height: 1.6;
    }

    .points li::before {
      content: "•";
      position: absolute;
      left: 6px;
      color: #4f46e5;
      font-weight: 700;
    }

    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .tag {
      font-size: 0.78rem;
      color: #4f46e5;
      background: #eef2ff;
      border-radius: 20px;
      padding: 3px 10px;
    }

    .category-wrapper {
      margin-bottom: 12px;
    }

    .category-badge {
      font-size: 0.85rem;
      font-weight: 600;
      color: #fff;
      background: #4f46e5;
      border-radius: 6px;
      padding: 4px 12px;
      display: inline-block;
    }

    /* 에러 */
    .error-msg {
      margin-top: 16px;
      padding: 12px 16px;
      background: #fef2f2;
      border: 1px solid #fecaca;
      border-radius: 10px;
      font-size: 0.9rem;
      color: #dc2626;
      display: none;
    }

    .error-msg.visible { display: block; }

    /* 로딩 스피너 */
    .spinner {
      display: none;
      margin-top: 24px;
      text-align: center;
      color: #888;
      font-size: 0.9rem;
    }

    .spinner.visible { display: block; }

    .spinner::before {
      content: "";
      display: inline-block;
      width: 18px;
      height: 18px;
      border: 2px solid #ddd;
      border-top-color: #4f46e5;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 8px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    @media (max-width: 480px) {
      .input-row { flex-direction: column; }
      .input-row button { width: 100%; }
      .card { padding: 24px 20px; }
    }
  </style>
</head>
<body>
  <header>
    <h1>AI 기사 분석기</h1>
    <p>URL을 입력하면 기사 본문을 추출합니다.</p>
  </header>

  <div class="card">
    <form id="analyzeForm">
      <div class="input-row">
        <input
          type="url"
          id="urlInput"
          placeholder="분석할 기사 URL을 입력하세요 (예: https://...)"
          required
          autocomplete="off"
          spellcheck="false"
        />
        <button type="submit" id="submitBtn">분석</button>
      </div>
    </form>

    <div class="spinner" id="spinner">분석 중...</div>
    <div class="error-msg" id="errorMsg"></div>

    <div id="result">
      <p class="result-title" id="resultTitle"></p>
      <p class="result-url" id="resultUrl"></p>
      <hr class="divider" />
      <div class="analysis" id="resultAnalysis">
        <div class="category-wrapper">
          <span class="category-badge" id="resultCategory"></span>
        </div>
        <p class="summary" id="resultSummary"></p>
        <ul class="points" id="resultPoints"></ul>
        <div class="tags" id="resultTags"></div>
      </div>
    </div>
  </div>

  <script>
    const form = document.getElementById("analyzeForm");
    const urlInput = document.getElementById("urlInput");
    const submitBtn = document.getElementById("submitBtn");
    const spinner = document.getElementById("spinner");
    const errorMsg = document.getElementById("errorMsg");
    const result = document.getElementById("result");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();

      const url = urlInput.value.trim();
      if (!url) return;

      // 초기화
      result.classList.remove("visible");
      errorMsg.classList.remove("visible");
      spinner.classList.add("visible");
      submitBtn.disabled = true;

      try {
        const res = await fetch("/analyze", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ url }),
        });

        const data = await res.json();

        if (!res.ok || data.error) {
          throw new Error(data.error || "분석에 실패했습니다.");
        }

        document.getElementById("resultTitle").textContent = data.title || "(제목 없음)";
        document.getElementById("resultUrl").textContent = data.url;

        // 카테고리
        const categoryEl = document.getElementById("resultCategory");
        if (data.category) {
          categoryEl.textContent = data.category;
          categoryEl.parentElement.style.display = "block";
        } else {
          categoryEl.parentElement.style.display = "none";
        }

        // 분석 결과
        document.getElementById("resultSummary").textContent = data.summary || "";

        const pointsList = document.getElementById("resultPoints");
        pointsList.innerHTML = "";
        (data.points || []).forEach(p => {
          const li = document.createElement("li");
          li.textContent = p;
          pointsList.appendChild(li);
        });

        const tagsEl = document.getElementById("resultTags");
        tagsEl.innerHTML = "";
        (data.tags || []).forEach(t => {
          const span = document.createElement("span");
          span.className = "tag";
          span.textContent = "#" + t;
          tagsEl.appendChild(span);
        });

        result.classList.add("visible");
      } catch (err) {
        errorMsg.textContent = err.message;
        errorMsg.classList.add("visible");
      } finally {
        spinner.classList.remove("visible");
        submitBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
